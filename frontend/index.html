<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>WebChat</title>
<style>
:root{
  --bg:#f0f2f5;--bg-card:#fff;--bg-self:#d9fdd3;--bg-other:#fff;
  --text:#111b21;--muted:#667781;--accent:#00a884;
  --hdr:#008069;--hdr-txt:#fff;--inp:#fff;--border:#e9edef;
  --shadow:0 1px 3px rgba(0,0,0,.12);
}
[data-theme=dark]{
  --bg:#111b21;--bg-card:#1f2c34;--bg-self:#005c4b;--bg-other:#1f2c34;
  --text:#e9edef;--muted:#8696a0;--accent:#00a884;
  --hdr:#1f2c34;--hdr-txt:#e9edef;--inp:#2a3942;--border:#2a3942;
  --shadow:0 1px 3px rgba(0,0,0,.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;
  transition:background .25s,color .25s}
.screen{display:none;height:100dvh;flex-direction:column}
.screen.active{display:flex}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
input,textarea{font:inherit;color:inherit;background:var(--inp);border:none;outline:none}

/* LOGIN */
#loginScreen{align-items:center;justify-content:center;padding:24px}
.login-box{background:var(--bg-card);border-radius:16px;padding:32px 24px;
  width:100%;max-width:360px;box-shadow:var(--shadow)}
.login-logo{font-size:48px;text-align:center;margin-bottom:8px}
.login-box h1{text-align:center;font-size:22px;margin-bottom:4px}
.login-box p{text-align:center;color:var(--muted);font-size:13px;margin-bottom:24px}
.login-box input{display:block;width:100%;padding:12px 14px;margin-bottom:12px;
  border-radius:10px;border:1.5px solid var(--border);background:var(--bg);
  font-size:15px;transition:border .2s}
.login-box input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:13px;background:var(--accent);color:#fff;
  border-radius:10px;font-size:16px;font-weight:600;margin-top:4px;transition:opacity .2s}
.login-btn:active{opacity:.85}
.login-err{color:#e53935;font-size:13px;text-align:center;margin-top:8px;min-height:18px}

/* CHAT HEADER */
.chat-header{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--hdr);color:var(--hdr-txt);flex-shrink:0;gap:10px}
.hdr-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.avatar-wrap{position:relative;flex-shrink:0}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-weight:700;font-size:16px;
  background:var(--accent);color:#fff}
.status-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;
  border-radius:50%;border:2px solid var(--hdr);background:#9e9e9e}
.status-dot.online{background:#4caf50}
.status-dot.away{background:#ffc107}
.hdr-info{min-width:0}
.hdr-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-lastseen{font-size:11px;color:rgba(255,255,255,0.7);margin-top:1px;white-space:nowrap;min-height:14px}
.hdr-actions{display:flex;gap:4px}
.icon-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:18px;transition:background .15s;color:var(--hdr-txt)}
.icon-btn:active{background:rgba(255,255,255,.15)}

/* MESSAGES */
.messages-area{flex:1;overflow-y:auto;padding:8px 0;position:relative;scroll-behavior:smooth}
.messages-area::-webkit-scrollbar{width:4px}
.messages-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.date-sep{text-align:center;margin:12px 0;font-size:12px;color:var(--muted)}
@keyframes msg-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-row.new-msg,.date-sep.new-msg{animation:msg-in 0.18s ease-out}
.date-sep span{background:var(--bg-card);padding:4px 10px;border-radius:8px;box-shadow:var(--shadow)}
.msg-row{display:flex;align-items:flex-end;gap:6px;padding:5px 10px;margin:1px 0}
.msg-row.self{flex-direction:row-reverse}
.msg-avatar{width:35px;height:35px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;
  background:var(--accent);color:#fff}
.msg-row.self .msg-avatar{background:#7c4dff}
.bubble{max-width:72vw;padding:7px 10px 4px;border-radius:8px;
  background:var(--bg-other);box-shadow:var(--shadow);position:relative;word-break:break-word;
  -webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
.msg-row.self .bubble{background:var(--bg-self)}
.bubble-text{font-size:15px;line-height:1.4}
.bubble-meta{display:flex;align-items:center;justify-content:flex-end;gap:4px;
  margin-top:2px;font-size:11px;color:var(--muted)}
.eye-icon{display:inline-flex;align-items:center;color:var(--accent);opacity:.8;flex-shrink:0;align-self:flex-end;margin-bottom:4px}
.recalled-msg{font-style:italic;color:var(--muted);font-size:13px}
.edited-tag{font-size:10px;color:var(--muted);margin-right:2px}

/* QUOTE */
.quote-bar{border-left:3px solid var(--accent);padding:4px 8px;margin-bottom:6px;
  border-radius:0 4px 4px 0;background:rgba(0,168,132,.1);font-size:13px;
  color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.quote-bar:active{background:rgba(0,168,132,.2)}
.quote-bar strong{color:var(--accent);display:block;font-size:11px;margin-bottom:1px}
@keyframes highlight{0%,100%{background:transparent}40%{background:rgba(0,168,132,.25)}}
.msg-highlight .bubble{animation:highlight 1.5s ease}
.quote-preview{display:none;align-items:center;gap:8px;padding:6px 10px 2px;
  border-left:3px solid var(--accent);margin-bottom:4px;background:var(--bg-card);
  border-radius:0 6px 6px 0}
.quote-preview.active{display:flex}
.quote-preview-text{flex:1;font-size:13px;color:var(--muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.quote-preview-name{font-size:11px;color:var(--accent);font-weight:600;margin-bottom:1px}
.quote-cancel{font-size:18px;color:var(--muted);flex-shrink:0;line-height:1}

/* MEDIA */
@keyframes img-shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.bubble img,.bubble video{max-width:100%;border-radius:6px;display:block;margin-bottom:4px;background:var(--border)}
.bubble.media-bubble,.msg-row.self .bubble.media-bubble{background:transparent!important;box-shadow:none!important;padding:2px}
.thumb{max-width:200px;max-height:160px;min-height:80px;object-fit:cover;border-radius:8px;display:block;cursor:zoom-in;
  background:linear-gradient(90deg,var(--border) 25%,var(--bg-card) 50%,var(--border) 75%);
  background-size:800px 100%;animation:img-shimmer 1.5s infinite linear}
.thumb.loaded{animation:none;background:transparent}
.video-wrapper{position:relative;display:inline-block;cursor:pointer}
.video-wrapper .play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:48px;height:48px;background:rgba(0,0,0,.7);border-radius:50%;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;
  pointer-events:none}
/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999;
  align-items:center;justify-content:center}
.lightbox.active{display:flex}
.lightbox img,.lightbox video{max-width:95vw;max-height:90vh;border-radius:6px;object-fit:contain}
.lightbox-close{position:absolute;top:16px;right:16px;font-size:28px;color:#fff;
  cursor:pointer;line-height:1;background:rgba(0,0,0,.4);border-radius:50%;
  width:40px;height:40px;display:flex;align-items:center;justify-content:center}
/* UNREAD BADGE */
.unread-badge{position:sticky;bottom:8px;left:50%;transform:translateX(-50%);
  background:var(--accent);color:#fff;padding:6px 14px;border-radius:20px;
  font-size:13px;font-weight:600;cursor:pointer;width:fit-content;
  box-shadow:0 2px 8px rgba(0,0,0,.2);z-index:10;display:none}

/* INPUT */
.input-area{background:var(--bg);padding:8px 10px;flex-shrink:0;border-top:1px solid var(--border)}
.input-row{display:flex;align-items:flex-end;gap:8px}
.input-wrap{flex:1;background:var(--inp);border-radius:22px;
  display:flex;align-items:flex-end;padding:6px 12px;gap:6px;box-shadow:var(--shadow)}
.input-wrap textarea{flex:1;resize:none;max-height:100px;font-size:15px;
  line-height:1.4;background:transparent;padding:2px 0}
.input-wrap textarea::placeholder{color:var(--muted)}
.attach-btn,.emoji-btn{font-size:20px;color:var(--muted);flex-shrink:0;padding:2px;transition:color .15s}
.attach-btn:active,.emoji-btn:active{color:var(--accent)}
.send-btn{width:44px;height:44px;border-radius:50%;
  background:var(--accent);color:#fff;font-size:20px;display:flex;
  align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
.send-btn:active{opacity:.8}

/* EMOJI PICKER */
.emoji-picker{position:absolute;bottom:70px;left:10px;right:10px;
  background:var(--bg-card);border-radius:12px;padding:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:50;display:none}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
.emoji-grid button{font-size:22px;padding:4px;border-radius:6px;transition:background .1s}
.emoji-grid button:active{background:var(--border)}

/* SEARCH */
.search-overlay{position:absolute;inset:0;background:var(--bg);z-index:100;
  display:none;flex-direction:column}
.search-overlay.active{display:flex}
.search-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:var(--hdr);color:var(--hdr-txt)}
.search-hdr input{flex:1;background:rgba(255,255,255,.15);border-radius:20px;
  padding:8px 14px;color:var(--hdr-txt);font-size:15px}
.search-hdr input::placeholder{color:rgba(255,255,255,.6)}
.search-results{flex:1;overflow-y:auto;padding:8px 0}
.search-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.search-item:active{background:var(--border)}
.search-item-text{font-size:14px;margin-bottom:2px}
.search-item-meta{font-size:12px;color:var(--muted)}
.search-item-text mark{background:rgba(0,168,132,.3);color:inherit;border-radius:2px}
.search-empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}

/* CONTEXT MENU */
.ctx-menu{position:fixed;background:var(--bg-card);border-radius:14px;
  box-shadow:0 4px 20px rgba(0,0,0,.25);z-index:200;display:none;
  padding:6px 4px;max-width:calc(100vw - 24px);user-select:none;-webkit-user-select:none}
.ctx-menu.active{display:flex;flex-direction:row;flex-wrap:wrap;gap:0}
.ctx-item{display:inline-flex !important;flex-direction:column !important;align-items:center;gap:4px;
  padding:10px 10px;font-size:11px;color:var(--text);
  transition:background .1s;border-radius:10px;white-space:nowrap;min-width:48px}
.ctx-item:active{background:var(--border)}
.ctx-icon{font-size:22px;line-height:1}
.ctx-label{font-size:11px}
.ctx-danger{color:#e53935}

/* ATTACH MENU */
.attach-menu{position:absolute;bottom:70px;left:10px;background:var(--bg-card);
  border-radius:12px;padding:8px;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:50;display:none}
.attach-menu.active{display:block}
.attach-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;
  border-radius:8px;font-size:14px;cursor:pointer;transition:background .1s}
.attach-opt:active{background:var(--border)}
.attach-opt-icon{font-size:22px;width:28px;text-align:center}

/* PROFILE */
.profile-overlay{position:absolute;inset:0;z-index:300;display:none;align-items:flex-end}
.profile-overlay.active{display:flex}
.profile-panel{width:100%;background:var(--bg-card);border-radius:20px 20px 0 0;
  max-height:90dvh;display:flex;flex-direction:column;
  box-shadow:0 -4px 24px rgba(0,0,0,.2);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.profile-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:16px}
.profile-save-btn{background:var(--accent);color:#fff;padding:6px 16px;
  border-radius:20px;font-size:14px;font-weight:600}
.profile-body{padding:24px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.profile-avatar-wrap{align-self:center;position:relative;cursor:pointer;margin-bottom:4px}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:var(--accent);
  color:#fff;font-size:32px;font-weight:700;display:flex;align-items:center;
  justify-content:center;overflow:hidden}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.profile-avatar-edit{position:absolute;bottom:0;right:0;background:var(--bg-card);
  border-radius:50%;width:26px;height:26px;display:flex;align-items:center;
  justify-content:center;font-size:14px;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.profile-label{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:-4px}
.profile-input{width:100%;padding:12px 14px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--bg);font-size:15px;
  transition:border .2s}
.profile-input:focus{border-color:var(--accent);outline:none}
.profile-err{font-size:13px;color:#e53935;min-height:16px;text-align:center}

/* KISS RAIN */
@keyframes kiss-fall{
  0%  {transform:translateY(-80px) rotate(-15deg);opacity:1}
  80% {opacity:1}
  100%{transform:translateY(110vh) rotate(25deg);opacity:0}
}
.kiss-rain{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;transition:opacity 1.5s}
.kiss-emoji{position:absolute;top:0;animation:kiss-fall linear forwards;animation-fill-mode:backwards}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="login-box">
    <div class="login-logo">💬</div>
    <h1>WebChat</h1>
    <p>Private 1-on-1 Chat</p>
    <input type="email" id="emailInput" placeholder="Email address" autocomplete="email">
    <input type="password" id="passcodeInput" placeholder="Chat Pass Code" maxlength="10">
    <button class="login-btn" id="loginBtn">Join Chat</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- CHAT -->
<div id="chatScreen" class="screen" style="position:relative">
  <header class="chat-header">
    <div class="hdr-left">
      <div class="avatar-wrap">
        <div class="avatar" id="partnerAvatar">?</div>
        <span class="status-dot" id="partnerDot"></span>
      </div>
      <div class="hdr-info">
        <div class="hdr-name" id="partnerName">Partner</div>
        <div class="hdr-lastseen" id="partnerLastSeen"></div>
      </div>
    </div>
    <div class="hdr-actions">
      <button class="icon-btn" id="searchBtn">🔍</button>
      <button class="icon-btn" id="themeBtn">🌙</button>
      <button class="icon-btn" id="profileBtn" title="Profile">👤</button>
      <button class="icon-btn" id="logoutBtn" title="Logout">↪️</button>
    </div>
  </header>

  <div class="messages-area" id="messagesArea">
    <div class="unread-badge" id="unreadBadge"></div>
  </div>

  <div class="input-area" id="inputArea">
    <div class="quote-preview" id="quotePreview">
      <div style="flex:1;min-width:0">
        <div class="quote-preview-name" id="quotePreviewName"></div>
        <div class="quote-preview-text" id="quotePreviewText"></div>
      </div>
      <button class="quote-cancel" id="quoteCancelBtn">✕</button>
    </div>
    <div class="input-row" id="textRow">
      <div class="input-wrap">
        <button class="emoji-btn" id="emojiBtn">😊</button>
        <textarea id="msgInput" placeholder="Message" rows="1"></textarea>
        <button class="attach-btn" id="attachBtn">📎</button>
      </div>
      <button class="send-btn" id="sendBtn" style="display:none">➤</button>
    </div>
  </div>

  <div class="emoji-picker" id="emojiPicker">
    <div class="emoji-grid" id="emojiGrid"></div>
  </div>

  <div class="attach-menu" id="attachMenu">
    <div class="attach-opt" id="attachImage"><span class="attach-opt-icon">🖼️</span>Image</div>
    <div class="attach-opt" id="attachVideo"><span class="attach-opt-icon">🎬</span>Video</div>
  </div>

  <div class="search-overlay" id="searchOverlay">
    <div class="search-hdr">
      <button class="icon-btn" id="closeSearchBtn">✕</button>
      <input type="text" id="searchInput" placeholder="Search messages…">
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <div class="ctx-menu" id="ctxMenu">
    <button class="ctx-item" id="ctxCopy"><span class="ctx-icon">📋</span><span class="ctx-label">Copy</span></button>
    <button class="ctx-item" id="ctxQuote"><span class="ctx-icon">💬</span><span class="ctx-label">Quote</span></button>
    <button class="ctx-item" id="ctxEdit"><span class="ctx-icon">✏️</span><span class="ctx-label">Edit</span></button>
    <button class="ctx-item" id="ctxRecall"><span class="ctx-icon">↩️</span><span class="ctx-label">Recall</span></button>
    <button class="ctx-item ctx-danger" id="ctxDelete"><span class="ctx-icon">🗑️</span><span class="ctx-label">Delete</span></button>
    <button class="ctx-item" id="ctxClear"><span class="ctx-icon">🧹</span><span class="ctx-label">Clear</span></button>
  </div>

  <input type="file" id="imageInput" accept="image/*" multiple style="display:none">
  <input type="file" id="videoInput" accept="video/*" style="display:none">
  <input type="file" id="avatarInput" accept="image/*" style="display:none">

  <!-- PROFILE PANEL -->
  <div class="profile-overlay" id="profileOverlay">
    <div class="profile-panel">
      <div class="profile-hdr">
        <button class="icon-btn" id="closeProfileBtn">✕</button>
        <span>Profile</span>
        <button class="profile-save-btn" id="saveProfileBtn">Save</button>
      </div>
      <div class="profile-body">
        <div class="profile-avatar-wrap" id="profileAvatarWrap">
          <div class="profile-avatar" id="profileAvatarDisplay">?</div>
          <div class="profile-avatar-edit">📷</div>
        </div>
        <label class="profile-label">Nickname</label>
        <input class="profile-input" id="profileNickname" type="text" maxlength="20" placeholder="Your nickname">
        <div class="profile-err" id="profileErr"></div>
      </div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-close" id="lightboxClose">✕</div>
  <div id="lightboxContent"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/app.js"></script>
</body>
</html>
